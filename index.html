<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoMind – Country Guesser</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #c8f135;
    --accent2: #3df0c2;
    --muted: #3a3a55;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --red: #ff4d6d;
    --gold: #ffd166;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);
    pointer-events: none;
    z-index: 999;
  }
  header {
    width: 100%;
    max-width: 800px;
    padding: 2.5rem 2rem 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .score-bar { display: flex; gap: 1.5rem; align-items: center; }
  .score-item { text-align: right; }
  .score-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
  .score-value { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--accent); transition: color 0.3s; }
  .score-value.gold { color: var(--gold); }
  main { width: 100%; max-width: 800px; padding: 2rem; flex: 1; }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .round-tag { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.5rem; }
  .clues-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .clues-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); }
  .points-badge { font-size: 0.65rem; color: var(--text-dim); }
  .points-badge span { color: var(--gold); font-weight: 700; }
  .clue-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .clue-item {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: 0.75rem 1rem;
    border-left: 2px solid var(--muted);
    background: rgba(255,255,255,0.02);
    border-radius: 0 4px 4px 0;
    animation: slideIn 0.4s ease;
  }
  .clue-item.new { border-left-color: var(--accent); animation: slideInGlow 0.5s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInGlow {
    from { opacity: 0; transform: translateX(-10px); box-shadow: -4px 0 20px var(--accent); }
    to { opacity: 1; transform: translateX(0); box-shadow: none; }
  }
  .clue-num { font-size: 0.6rem; color: var(--text-dim); margin-top: 3px; flex-shrink: 0; min-width: 1.2rem; }
  .clue-text { font-size: 0.9rem; line-height: 1.6; color: var(--text); }
  .clue-deduction { margin-left: auto; flex-shrink: 0; font-size: 0.65rem; color: var(--red); font-style: italic; margin-top: 3px; }
  .clue-locked {
    display: flex; gap: 1rem; align-items: center;
    padding: 0.75rem 1rem;
    border-left: 2px dashed var(--muted);
    background: rgba(255,255,255,0.01);
    border-radius: 0 4px 4px 0;
    color: var(--text-dim); font-size: 0.8rem; font-style: italic;
  }
  .input-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
  .guess-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--muted);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .guess-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,241,53,0.15); }
  .guess-input::placeholder { color: var(--muted); }
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.75rem 1.25rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-guess { background: var(--accent); color: #0a0a0f; }
  .btn-guess:hover { background: #d9ff40; transform: translateY(-1px); }
  .btn-guess:active { transform: translateY(0); }
  .btn-hint { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-hint:hover { background: rgba(61,240,194,0.08); }
  .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-skip { background: transparent; color: var(--text-dim); border: 1px solid var(--muted); font-size: 0.7rem; }
  .btn-skip:hover { color: var(--text); border-color: var(--text-dim); }
  .action-row { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; }
  .hint-cost { font-size: 0.7rem; color: var(--text-dim); }
  .hint-cost span { color: var(--red); }
  .feedback {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-style: italic;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.wrong { display: block; background: rgba(255,77,109,0.1); border-left: 2px solid var(--red); color: var(--red); }
  .feedback.correct { display: block; background: rgba(200,241,53,0.08); border-left: 2px solid var(--accent); color: var(--accent); }
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem;
    max-width: 460px;
    width: 90%;
    text-align: center;
    position: relative;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
  .modal-country { color: var(--accent); font-size: 1.1rem; margin-bottom: 1rem; }
  .modal-points { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--gold); margin-bottom: 0.5rem; }
  .modal-sub { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 2rem; }
  .btn-next { background: var(--accent); color: #0a0a0f; padding: 0.9rem 2.5rem; font-size: 0.85rem; }
  .btn-next:hover { background: #d9ff40; }
  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s ease; }
  .attempts-row { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; }
  .attempt-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--muted); background: transparent; transition: background 0.2s; }
  .attempt-dot.used { background: var(--red); border-color: var(--red); }
  .total-wrap { text-align: center; padding: 1.5rem 0; border-top: 1px solid var(--border); margin-top: 2rem; }
  .total-label { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.5rem; }
  .total-score { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; color: var(--gold); }
  .autocomplete-list {
    position: absolute; z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    width: 100%; left: 0; top: 100%;
    max-height: 160px; overflow-y: auto;
    border-radius: 0 0 4px 4px;
    display: none;
  }
  .autocomplete-list.show { display: block; }
  .autocomplete-item { padding: 0.6rem 1rem; font-size: 0.85rem; cursor: pointer; transition: background 0.1s; }
  .autocomplete-item:hover, .autocomplete-item.active { background: rgba(200,241,53,0.1); color: var(--accent); }
  .input-wrap { position: relative; flex: 1; }
  .session-note { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; text-align: center; margin-top: 0.75rem; }
</style>
</head>
<body>

<header>
  <div class="logo">GEO<span>MIND</span></div>
  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Round</div>
      <div class="score-value" id="roundNum">1/10</div>
    </div>
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-value gold" id="totalScore">0</div>
    </div>
  </div>
</header>

<main>
  <div class="game-card">
    <div class="round-tag" id="roundTag">ROUND 01 · IDENTIFY THE COUNTRY</div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>

    <div class="clues-header">
      <div class="clues-title">Clues Revealed</div>
      <div class="points-badge">Max this round: <span id="maxPoints">1000</span> pts</div>
    </div>

    <ul class="clue-list" id="clueList"></ul>
    <div class="clue-locked" id="lockedClue">🔒 Next clue costs <span id="nextDeduction" style="color:var(--red)">−150</span> pts · click "Reveal Hint"</div>

    <div class="attempts-row" id="attemptsRow"></div>

    <div class="input-row">
      <div class="input-wrap">
        <input class="guess-input" type="text" id="guessInput" placeholder="Type a country name…" autocomplete="off">
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>
      <button class="btn btn-guess" onclick="submitGuess()">Guess</button>
    </div>

    <div class="action-row">
      <div class="hint-cost">Reveal hint costs <span id="hintCost">150</span> pts</div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-skip" onclick="skipRound()">Skip →</button>
        <button class="btn btn-hint" id="hintBtn" onclick="revealHint()">Reveal Hint</button>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="session-note" id="sessionNote"></div>
  </div>
</main>

<!-- Round result modal -->
<div class="overlay" id="resultOverlay">
  <div class="modal">
    <div class="modal-emoji" id="resultEmoji">🌍</div>
    <div class="modal-title" id="resultTitle">Correct!</div>
    <div class="modal-country" id="resultCountry"></div>
    <div class="modal-points" id="resultPoints">+800</div>
    <div class="modal-sub" id="resultSub"></div>
    <button class="btn btn-guess btn-next" onclick="nextRound()">Next Country →</button>
  </div>
</div>

<!-- Game over modal -->
<div class="overlay" id="gameOverOverlay">
  <div class="modal">
    <div class="modal-emoji">🏆</div>
    <div class="modal-title" style="color:var(--gold)">Game Over</div>
    <div class="modal-sub" style="margin-bottom:0.5rem">You've completed all 10 rounds</div>
    <div class="total-wrap">
      <div class="total-label">Final Score</div>
      <div class="total-score" id="finalScore">0</div>
    </div>
    <div class="modal-sub" id="finalRank" style="font-size:0.9rem;color:var(--accent2);margin-top:0.5rem;margin-bottom:1.5rem"></div>
    <button class="btn btn-guess btn-next" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>

    { text: "The country has its own ancient alphabet, Ge'ez, which is one of the world's oldest continuously used writing systems.", pts: 150 },
    { text: "It hosts the source of the Blue Nile, which contributes around 80% of the Nile's total water volume, making it a geopolitical flashpoint with downstream nations.", pts: 200 },
    { text: "This nation is home to the largest population of any landlocked country in the world and one of the youngest populations by median age.", pts: 200 },
    { text: "A monolithic stone church was carved entirely out of solid rock here in the 12th century — from the top down — by workers who reportedly laboured for 24 years.", pts: 200 },
    { text: "The country's cuisine is traditionally served on a spongy sourdough flatbread used as both plate and utensil — no cutlery is involved.", pts: 150 },
    { text: "It fought a war with a neighbouring country over a border dispute, and the two nations' leaders won the Nobel Peace Prize for resolving it — only for tensions to reignite months later.", pts: 200 },
  ],

  "Switzerland": [
    { text: "Every citizen of this country is legally required to have access to a nuclear fallout shelter — it has more bunker spaces than its total population.", pts: 0 },
    { text: "Women could not vote in national elections here until 1971, and in one canton, the right was only granted by court order in 1990.", pts: 150 },
    { text: "The country has been officially neutral in armed conflicts since 1815 and hosts the headquarters of the International Red Cross.", pts: 150 },
    { text: "It contains the world's longest railway tunnel, completed in 2016, running 57 kilometres beneath a major mountain range.", pts: 150 },
    { text: "Despite global fame for its cheese and chocolate, neither product was invented here — both were imported traditions refined over centuries.", pts: 150 },
    { text: "This nation has four official languages — German, French, Italian, and Romansh — with different regions using entirely different languages in daily life.", pts: 150 },
    { text: "The country allows its citizens to directly challenge any law passed by parliament through a referendum, requiring only 50,000 signatures to trigger a public vote.", pts: 200 },
    { text: "It is home to the world's largest physics laboratory, which sits in a tunnel that straddles two countries and stretches 27 kilometres in circumference.", pts: 200 },
    { text: "Banks here held dormant accounts belonging to Holocaust victims for decades, only releasing unclaimed funds after international pressure in the 1990s.", pts: 200 },
    { text: "The country regularly has among the highest density of millionaires per capita in the world, yet its citizens consistently vote against tax cuts for the wealthy.", pts: 200 },
  ],

  "Peru": [
    { text: "This country's ancient civilization built an entire city at 2,430 metres above sea level using only stone tools — the blocks fit so precisely a knife cannot pass between them.", pts: 0 },
    { text: "The potato originated here, with over 3,000 varieties still cultivated in its highland regions — more potato diversity than anywhere else on Earth.", pts: 150 },
    { text: "The country shares a massive high-altitude lake with a neighbour — the world's highest navigable lake — which sits at 3,800 metres above sea level.", pts: 150 },
    { text: "Its ancient road network was longer than the Roman Empire's road system, built entirely without the wheel — designed for foot travel and llamas.", pts: 150 },
    { text: "The country contains three distinct climate zones within its borders: Pacific coastal desert, Andean highlands, and Amazon rainforest.", pts: 150 },
    { text: "Giant geoglyphs etched into its coastal desert plateau are so large they can only be fully appreciated from the air — their purpose remains debated by archaeologists.", pts: 150 },
    { text: "Spanish conquest of this land was achieved by fewer than 200 soldiers who captured and ransomed the emperor for a room full of gold and silver — then killed him anyway.", pts: 200 },
    { text: "The country has the world's largest flying bird by wingspan still in existence — the Andean condor — which is also its national symbol.", pts: 150 },
    { text: "Its government has spent decades excavating an ancient site that may contain dozens of undiscovered tombs — archaeologists estimate less than 30% has been excavated.", pts: 200 },
    { text: "The country's cuisine is considered one of the most biodiverse in the world, using ingredients grown at sea level and at 4,000 metres elevation within the same national kitchen.", pts: 200 },
  ],

  "Finland": [
    { text: "This country has more saunas than cars — approximately 3 million saunas for a population of 5.5 million, with sauna culture holding near-sacred cultural status.", pts: 0 },
    { text: "It consistently ranks first in global education assessments, yet teachers here work fewer hours than OECD averages and homework is minimal.", pts: 150 },
    { text: "The country has roughly 188,000 lakes — giving it one of the highest lake-to-land ratios of any nation on Earth.", pts: 150 },
    { text: "It hosts the annual Wife Carrying World Championship, a sport with precise technical rules governing legal carry positions and time penalties.", pts: 150 },
    { text: "This country gave the world's fictional Santa Claus an official home — there is a designated Santa's village at the Arctic Circle with its own post office.", pts: 150 },
    { text: "Mobile phones were invented in a neighbouring country, but this country's company dominated global mobile phone manufacturing for over a decade before losing it all.", pts: 200 },
    { text: "The country fought a war with the Soviet Union in which it was vastly outnumbered, yet inflicted casualties at a ratio of nearly 5:1 before ultimately ceding territory.", pts: 200 },
    { text: "A concept called 'sisu' — a form of extreme resilience, stoic determination, and grit — has no direct English translation and is considered a national character trait.", pts: 150 },
    { text: "This nation has the highest per-capita heavy metal bands of any country in the world, despite its small population.", pts: 200 },
    { text: "Its capital hosts the world's only permanent statue of an athlete who was stripped of an Olympic gold medal — a deliberate national statement about the injustice of that disqualification.", pts: 200 },
  ],

  "New Zealand": [
    { text: "This country was one of the last major landmasses on Earth settled by humans — Polynesian navigators arrived only around 700 years ago.", pts: 0 },
    { text: "It was the first country in the world to grant women the right to vote in national elections, in 1893.", pts: 150 },
    { text: "The country has no native land mammals except two species of bat — its entire land fauna evolved without mammals for 80 million years.", pts: 150 },
    { text: "More sheep live here than people — roughly 5 sheep per person — and wool was historically its primary export.", pts: 150 },
    { text: "The country has a 'nuclear-free zone' status written into law, and it banned nuclear-powered vessels from its waters — causing a temporary diplomatic rift with a major ally.", pts: 200 },
    { text: "Its indigenous people navigated the Pacific Ocean without instruments, using star maps, wave patterns, and bird behaviour — achievements not replicated until the modern era.", pts: 150 },
    { text: "The country has a flightless national bird that is nocturnal, lays the largest egg relative to body size of any bird, and is functionally blind in daylight.", pts: 150 },
    { text: "This nation granted a river full legal personhood in 2017 — the same rights as a human being — based on indigenous belief that the river is an ancestor.", pts: 200 },
    { text: "The country's largest city sits on a volcanic field of over 50 volcanoes, some of which erupted within the past few hundred years.", pts: 200 },
    { text: "A government official here holds the title 'Minister for the Future' — a role created to legally represent the interests of people not yet born.", pts: 200 },
  ],

  "India": [
    { text: "This country has the world's largest postal network, with post offices in locations accessible only by boat, camel, or on foot.", pts: 0 },
    { text: "It produces more films annually than any other country — its film industry releases over 1,500 films per year across dozens of regional languages.", pts: 150 },
    { text: "The game of chess originated here, as did the concept of zero — both exports that fundamentally altered the course of human civilisation.", pts: 150 },
    { text: "This country has more vegetarians as a percentage of population than any other large nation, with over 30% of its citizens eating no meat.", pts: 150 },
    { text: "A festival here involves the world's largest human gathering — a religious pilgrimage that can attract over 40 million people to a single location in a single day.", pts: 150 },
    { text: "The country's constitution is the world's longest written national constitution, containing 448 articles across 22 parts and 12 schedules.", pts: 200 },
    { text: "It was the first country to formally recognise that a third gender exists in law — a recognition that predates most Western legal frameworks by decades.", pts: 200 },
    { text: "A city here receives so much rain during monsoon season that it once recorded 94 centimetres of rainfall in a single 24-hour period.", pts: 200 },
    { text: "The decimal number system used universally in modern mathematics was developed here and carried to the rest of the world via Arabic scholars.", pts: 150 },
    { text: "A monument here — widely considered one of the world's great love stories in stone — took 22 years and 20,000 workers to construct, yet its architect was later imprisoned by the man who commissioned it.", pts: 200 },
  ],

  "China": [
    { text: "This country invented paper, printing, gunpowder, and the compass — four technologies that historians argue fundamentally changed the trajectory of human civilisation.", pts: 0 },
    { text: "It has more speakers of a tonal language as a first language than any other on Earth, with multiple mutually unintelligible dialects unified by a common writing system.", pts: 150 },
    { text: "The country built a wall so long it stretches roughly the distance from New York to Los Angeles — though the claim it's visible from space is a myth.", pts: 150 },
    { text: "It produces and consumes more pork than any other country — roughly half of the world's pigs live within its borders.", pts: 150 },
    { text: "A single river here — the Yangtze — drains an area larger than Western Europe and hosts the world's largest hydroelectric dam, which has subtly shifted Earth's rotation.", pts: 150 },
    { text: "The country once had a policy limiting most families to one child for over three decades — one of the most consequential demographic experiments in history.", pts: 200 },
    { text: "It is the world's largest producer of steel — producing more than all other countries combined — used primarily to build infrastructure at an unprecedented pace.", pts: 150 },
    { text: "The country has the world's longest high-speed rail network, spanning distances comparable to circumnavigating the globe.", pts: 150 },
    { text: "A terra-cotta army of thousands of life-size soldiers was buried here with an emperor over 2,200 years ago — and archaeologists believe the main tomb has still never been opened.", pts: 200 },
    { text: "The country's ancient examination system, which allowed commoners to join the government by passing tests, was the world's first meritocratic civil service — adopted later by British India and Europe.", pts: 200 },
  ],

  "Australia": [
    { text: "This country's most famous structure was designed by a foreign architect who was later excluded from the project, left before it was finished, and never returned.", pts: 0 },
    { text: "It has more venomous species of snakes than any other country, yet fewer snake-bite deaths annually than many far smaller nations.", pts: 150 },
    { text: "The country fought an unofficial 'war' against emus in 1932 — deploying soldiers and machine guns against a flock of birds — and lost.", pts: 150 },
    { text: "A large portion of its land is classified as desert, yet it is the world's largest exporter of coal and beef simultaneously.", pts: 150 },
    { text: "This country's indigenous people are the longest continuous civilisation in human history, with cultural and spiritual connections to the land stretching back at least 65,000 years.", pts: 200 },
    { text: "The country has a practice of compulsory voting — citizens can be fined for not turning up to an election, resulting in turnout rates consistently above 90%.", pts: 150 },
    { text: "One of its cities has the world's largest tram network, while another contains more coffee shops per capita than almost any city outside Italy.", pts: 200 },
    { text: "The country is home to the longest fence in the world — a 5,600 km 'dingo fence' built to protect livestock from wild dogs.", pts: 150 },
    { text: "Its national government once implemented a deliberate policy of removing indigenous children from their families and placing them with white families — a period now officially known as the 'Stolen Generations'.", pts: 200 },
    { text: "Sheep outnumber people by a ratio of about 3.5 to 1 here, and the country produces roughly 90% of the world's merino wool.", pts: 150 },
  ],

  "Germany": [
    { text: "This country's beer purity law — mandating only water, barley, and hops could be used in brewing — was enacted in 1516 and is one of the world's oldest food regulations still referenced today.", pts: 0 },
    { text: "It has the world's largest Christmas market tradition, with over 3,000 markets held annually, a practice dating back to the 14th century.", pts: 150 },
    { text: "The country produces and exports more cars per capita than any other major economy, with automotive engineering deeply embedded in its national identity.", pts: 150 },
    { text: "A wall once divided its largest city in two for 28 years — families were separated, and over 140 people died attempting to cross it.", pts: 150 },
    { text: "This nation's constitution, written after total defeat in war, explicitly states that human dignity is inviolable — and that any government violating it may be resisted.", pts: 200 },
    { text: "It invented the kindergarten — the word itself is this country's language — as well as the modern research university, the PhD, and the printing press.", pts: 150 },
    { text: "The country is the world's second largest book fair host, and Frankfurt's annual book fair has operated continuously since 1454.", pts: 200 },
    { text: "Its government mandates that companies over a certain size must include workers' representatives on the board of directors — a system called co-determination.", pts: 200 },
    { text: "The autobahn here has sections with no speed limit — yet its road fatality rate is lower than countries with strict national limits.", pts: 150 },
    { text: "This country's language has a unique ability to create compound words — the longest legally used word contains 63 letters and refers to a specific regulation about beef labelling.", pts: 200 },
  ],

  "France": [
    { text: "This country is the world's most visited nation by international tourists — more people visit it annually than live there.", pts: 0 },
    { text: "It has more cheeses than there are days in a year — de Gaulle famously asked how one could govern a nation with over 246 varieties.", pts: 150 },
    { text: "The country's legal system has a provision allowing a living person to marry a dead one — a 'posthumous marriage' requires presidential approval.", pts: 150 },
    { text: "It invented the metric system during its revolution, standardising measurement globally — though it retained its own regional wine measurements simultaneously.", pts: 150 },
    { text: "The country's Foreign Legion — an army unit open to foreigners seeking a new identity — can grant citizenship to any soldier wounded in battle on its behalf.", pts: 200 },
    { text: "A road race originating here in 1903 became the world's most prestigious cycling event, yet for many years it was boycotted by its own country's top riders.", pts: 150 },
    { text: "The country has the highest number of nuclear reactors per capita of any major nation, generating around 70% of its electricity from atomic power.", pts: 200 },
    { text: "Its language academy — established in 1635 — is tasked with protecting the purity of the language from foreign words, officially ruling against 'le weekend' and 'le selfie'.", pts: 200 },
    { text: "This country's revolution gave the world a political vocabulary — 'left' and 'right' as political positions originate from where factions sat in its revolutionary assembly.", pts: 200 },
    { text: "The country holds a village called 'Pussy,' a town called 'Condom,' and a commune officially named 'Fucking' lies just across a neighbouring border it once controlled.", pts: 150 },
  ],

  "Russia": [
    { text: "This country spans 11 time zones — if it were a continent, it would be the largest on Earth, covering more land than Pluto's surface area.", pts: 0 },
    { text: "It contains Lake Baikal, which holds approximately 20% of the world's unfrozen surface freshwater — more than all of North America's Great Lakes combined.", pts: 150 },
    { text: "This country sent the first human being into space, the first woman, the first spacewalk, and the first space station — all before any other nation.", pts: 150 },
    { text: "The Trans-Siberian Railway, crossing this country from west to east, is the world's longest railway line — a single trip takes about 7 days without stopping.", pts: 150 },
    { text: "During its most extreme historical period, a government here deliberately engineered a famine that killed millions of people by exporting grain while its own citizens starved.", pts: 200 },
    { text: "The country has a tradition of literary giants so revered that authors here have historically wielded more public influence than politicians.", pts: 150 },
    { text: "It has the world's largest proven natural gas reserves and uses this resource as both economic leverage and diplomatic tool with neighbouring countries.", pts: 200 },
    { text: "The country's vodka consumption is so embedded culturally that a 1980s government campaign to limit it was credited with accelerating the nation's financial collapse.", pts: 200 },
    { text: "A chess match here in 1972 — between a local champion and an American — was called 'the match of the century' and was treated as a Cold War proxy battle.", pts: 200 },
    { text: "The country had a tsar, then a brief democracy of months, then communism for 74 years, then returned to a form of presidential rule — all within living memory of people born in its final Soviet years.", pts: 200 },
  ],

  "Mexico": [
    { text: "This country's ancient civilisation built a pyramid that, by volume, is larger than the Great Pyramid of Giza — the largest pyramid on Earth by volume.", pts: 0 },
    { text: "It is the birthplace of chocolate, with cacao cultivated here for at least 3,500 years before being exported to Europe — where it was heavily sweetened.", pts: 150 },
    { text: "The country has one of the world's largest megacities, which was built on a lake — its ancient predecessor city was literally constructed on islands connected by causeways.", pts: 150 },
    { text: "It is a megadiverse country — home to around 10% of all species on Earth within its borders, despite covering only 1.5% of global land area.", pts: 150 },
    { text: "A holiday celebrated here in late October has been adopted globally — it honours the dead with offerings, marigolds, and skull imagery, and predates Christian influence.", pts: 150 },
    { text: "The country's cuisine is one of only two national cuisines listed as UNESCO Intangible Cultural Heritage, recognised for its complexity and biological diversity of ingredients.", pts: 200 },
    { text: "This nation was the source of one of history's greatest epidemics — smallpox brought by Spanish conquistadors killed an estimated 90% of the indigenous population within decades.", pts: 200 },
    { text: "The country is the world's largest producer of avocados and tequila — two exports that have generated international cartel violence over their supply chains.", pts: 200 },
    { text: "An artist from here is one of the world's most recognised painters — famous for self-portraits, surrealism, and a turbulent marriage — whose work now sells for record prices.", pts: 150 },
    { text: "The country's border with its northern neighbour is the most crossed international border in the world, with over 350 million legal crossings annually.", pts: 150 },
  ],

  "Turkey": [
    { text: "This country contains two continents within its borders — a small northwest portion is geographically European, while the vast majority is in Asia.", pts: 0 },
    { text: "It is home to the world's oldest known temple complex, dating back over 11,000 years — predating Stonehenge by 6,000 years and pottery by 1,000 years.", pts: 150 },
    { text: "The country is the world's largest producer of hazelnuts, supplying roughly 75% of global demand — meaning most of the world's chocolate-hazelnut spreads rely on it.", pts: 150 },
    { text: "Its largest city was once simultaneously the capital of three empires across different historical periods — Roman, Byzantine, and Ottoman.", pts: 150 },
    { text: "The country is the world's largest recipient of refugees, hosting more displaced people than any other nation.", pts: 200 },
    { text: "It invented the whirling dervish as a form of Sufi meditation — a practice where spinning continuously for extended periods is considered a path to divine union.", pts: 150 },
    { text: "Tulips — often associated with the Netherlands — were actually cultivated and exported from this country to Europe in the 16th century, triggering one of history's first economic bubbles.", pts: 200 },
    { text: "The country technically controls the only legal waterway connecting the Black Sea to the Mediterranean, giving it enormous geopolitical leverage over naval movements.", pts: 200 },
    { text: "Its founder abolished the caliphate, banned religious dress in government spaces, switched from Arabic to Latin script, and gave women the right to vote — all within a single decade.", pts: 200 },
  ],

  "Argentina": [
    { text: "This country has defaulted on its national debt more times than any other country in modern history — at least nine times — yet remains one of South America's largest economies.", pts: 0 },
    { text: "It is the birthplace of a dance that became one of the world's most recognisable — performed in close embrace, developed in the underclass neighbourhoods of its capital.", pts: 150 },
    { text: "The country has more psychologists per capita than any other nation, with the capital city having the highest concentration of therapists of any city on Earth.", pts: 150 },
    { text: "A military junta here 'disappeared' an estimated 30,000 people between 1976 and 1983 — victims were drugged and dropped into the sea from aircraft.", pts: 200 },
    { text: "Beef consumption here is so culturally central that annual per-capita consumption has historically exceeded 50kg — one of the highest in the world.", pts: 150 },
    { text: "The country is one of only three in the world to have produced and used ballistic missiles, and once had a nuclear weapons programme it voluntarily dismantled.", pts: 200 },
    { text: "A war fought here in 1982 lasted only 74 days, between this country and a superpower — over a group of remote islands with fewer than 2,000 civilian inhabitants.", pts: 200 },
    { text: "This country was the destination of choice for Nazi war criminals fleeing Europe after World War II — more war criminals resettled here than anywhere else.", pts: 200 },
    { text: "The country is the world's largest producer of soybeans not used for direct human consumption, growing vast monocultures that have transformed its native forests.", pts: 150 },
  ],

  "South Korea": [
    { text: "This country has the fastest average internet speeds in the world and the highest smartphone penetration rate of any nation.", pts: 0 },
    { text: "It went from one of the world's poorest economies to one of the wealthiest in a single generation — a transformation economists call the 'Miracle on the Han River'.", pts: 150 },
    { text: "The country's culture of competitive exam pressure has produced one of the world's most educated populations, yet also one of the highest rates of youth burnout and suicide.", pts: 200 },
    { text: "A handful of massive family-owned conglomerates here control a disproportionate share of the entire national economy — including electronics, construction, and insurance.", pts: 150 },
    { text: "This country's pop music and television dramas have created one of the most globally influential cultural exports of the 21st century, spreading its language worldwide.", pts: 150 },
    { text: "It is the world's leading producer of memory semiconductors, controlling the supply of chips that power most of the world's smartphones and computers.", pts: 150 },
    { text: "Plastic surgery rates here are among the highest per capita globally — procedures are considered routine and often gifted as graduation presents.", pts: 200 },
    { text: "The country technically remains at war with its northern neighbour — the Korean War ended with a ceasefire, not a peace treaty, in 1953.", pts: 150 },
    { text: "A food — fermented vegetables prepared with chilli and garlic — is so central to national identity that a government agency monitors its international representation.", pts: 150 },
    { text: "The country's president was impeached and jailed after a scandal involving a secret confidante with no official role who had been controlling state affairs behind the scenes.", pts: 200 },

  "Canada": [
    { text: "This country has the world's longest coastline — stretching over 202,000 kilometres, more than twice that of any other nation.", pts: 0 },
    { text: "It produces 71% of the world's maple syrup, with the majority coming from a single province — and a strategic maple syrup reserve is maintained against shortage.", pts: 150 },
    { text: "The country has more lakes than the rest of the world combined — an estimated 60% of all freshwater lakes on Earth lie within its borders.", pts: 150 },
    { text: "Its largest city does not hold the title of national capital — this is one of the few countries where the capital is not the most populous city.", pts: 150 },
    { text: "The country formally apologised to its indigenous peoples for a century-long policy of forcibly removing children from their families and placing them in residential schools.", pts: 200 },
    { text: "A government policy of official bilingualism here requires all federal services in both English and French — yet fewer than 20% of citizens speak both fluently.", pts: 150 },
    { text: "This country invented basketball, standard time zones, and the telephone — though the latter is disputed by a neighbouring country.", pts: 200 },
    { text: "The country's northernmost territories experience permanent darkness for months in winter and permanent daylight for months in summer, making seasonal depression a public health concern.", pts: 150 },
    { text: "It is home to the world's second-largest proven oil reserves — most of which are locked in tar sands that require enormous energy to extract.", pts: 200 },

  "Egypt": [
    { text: "This country's ancient civilisation was so long-lived that Cleopatra — its last pharaoh — lived closer in time to the Moon landing than to the construction of the pyramids.", pts: 0 },
    { text: "The country controls the world's most strategically important artificial waterway — a canal through which roughly 12% of global trade passes daily.", pts: 150 },
    { text: "It is home to the world's oldest known peace treaty — a document signed between two empires over a border dispute, dating back 3,200 years.", pts: 150 },
    { text: "The country's ancient writing system went undeciphered for over 1,400 years — decoded only when a multilingual stone was found by soldiers during a military campaign.", pts: 150 },
    { text: "Its ancient monuments were aligned with astronomical precision — the sun shines directly on the face of a pharaoh's statue only on his birthday and coronation date.", pts: 200 },
    { text: "Despite being over 90% desert, this country is the most populous nation in the Arab world and one of the most densely populated in Africa.", pts: 150 },
    { text: "The country's bread subsidies — maintained since the 1970s — are so politically critical that any attempt to reduce them has triggered mass unrest and government collapse.", pts: 200 },
    { text: "A disease here — schistosomiasis — was so endemic for millennia that scientists believe it may explain the ancient texts' references to unusual symptoms in pharaohs.", pts: 200 },

  "Indonesia": [
    { text: "This country is the world's largest archipelago, consisting of over 17,000 islands, of which roughly 6,000 are inhabited.", pts: 0 },
    { text: "It is home to the world's largest Buddhist monument — a 9th-century temple built in the shape of a mandala, abandoned for centuries and reclaimed by jungle.", pts: 150 },
    { text: "The country is the world's largest democracy by Muslim population — more Muslims live here than in all Arab countries combined.", pts: 150 },
    { text: "It has more active volcanoes than any other country — around 130 — and sits on the 'Ring of Fire' where four tectonic plates converge.", pts: 150 },
    { text: "This country is one of only three places on Earth where wild orangutans can be found, yet it loses a football field of rainforest every minute to palm oil plantations.", pts: 200 },
    { text: "A 2004 earthquake here triggered the deadliest tsunami in recorded history, killing over 230,000 people across 14 countries.", pts: 200 },
    { text: "The country has over 700 distinct languages — it uses a common national language as a lingua franca precisely because no single regional language could be imposed without causing civil conflict.", pts: 200 },
    { text: "The world's largest flower by weight grows here — a parasite with no leaves or stems that blooms for just a few days and smells of rotting meat to attract pollinators.", pts: 150 },

  "Iran": [
    { text: "This country has one of the oldest continuous civilisations on Earth — its empire once stretched from Egypt to India and is considered the world's first 'superpower'.", pts: 0 },
    { text: "It is home to one of the world's oldest monotheistic religions, which may have influenced the development of Judaism, Christianity, and Islam.", pts: 150 },
    { text: "The country is the world's largest producer of saffron — supplying around 90% of global demand for the world's most expensive spice by weight.", pts: 150 },
    { text: "Ancient underground aqueducts here, called 'qanats', were built thousands of years ago and still supply water to farming communities today.", pts: 150 },
    { text: "The country's 1979 revolution was unique in that it replaced a Western-backed monarchy with a theocratic republic — a form of government with almost no historical precedent.", pts: 200 },
    { text: "It has one of the highest rates of nose job surgeries per capita in the world — reportedly for both cosmetic and social status reasons.", pts: 150 },
    { text: "The country sits on approximately 10% of the world's proven oil reserves and 15% of natural gas reserves, yet its citizens face fuel rationing due to sanctions.", pts: 200 },
    { text: "Chess, backgammon, and polo all originated in or were significantly developed within the borders of this ancient civilisation before spreading to the world.", pts: 200 },

  "Greece": [
    { text: "This country gave the world democracy, the Olympics, the alphabet used across Europe, and theatrical drama — all within a single century, around 2,500 years ago.", pts: 0 },
    { text: "It has more archaeological sites under active management than any other country, yet lacks the budget to excavate most of them — the majority remain buried.", pts: 150 },
    { text: "The country's debt crisis in the 2010s became the most expensive bailout in IMF history, requiring three separate rescue packages over six years.", pts: 150 },
    { text: "This nation has the longest average working hours of any country in the European Union, yet among the lowest productivity rates.", pts: 150 },
    { text: "The concept of the 'marathon' distance — 42.195 kilometres — originates from a legend here about a soldier who ran from a battlefield to announce victory, then died.", pts: 150 },
    { text: "The country's tax evasion problem is so severe that a significant portion of the economy operates entirely off-the-books — some estimates suggest it exceeds 20% of GDP.", pts: 200 },
    { text: "An ancient temple here dedicated to the goddess of wisdom was so perfectly engineered that its columns are slightly curved inward — a deliberate optical illusion to make them appear straight.", pts: 200 },
    { text: "The country has over 6,000 islands, but fewer than 230 are inhabited — and disputes over uninhabited rocks have nearly caused armed conflict with a neighbour multiple times.", pts: 200 },
