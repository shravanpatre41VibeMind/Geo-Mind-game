  "Nigeria": [
    { text: "This country is the most populous in Africa, with a population growing at such a rate that it is projected to surpass the United States by 2050.", pts: 0 },
    { text: "It has the world's largest movie industry by number of films produced annually — nicknamed 'Nollywood', it outpaces even Hollywood in volume of output.", pts: 150 },
    { text: "The country produces roughly 90% of the world's 'agbalumo' — a fruit with no English common name — yet exports very little of it.", pts: 200 },
    { text: "A civil war here in the late 1960s — over a breakaway eastern region — resulted in a famine that killed between one and three million people, mostly children.", pts: 200 },
    { text: "The country is the largest oil producer in Africa, yet experiences frequent fuel shortages — its refineries are so poorly maintained that it imports most of its own petroleum.", pts: 150 },
    { text: "Over 500 languages are spoken within its borders, with three — Hausa, Yoruba, and Igbo — serving as regional lingua francas alongside the official European language.", pts: 150 },
    { text: "A form of organised crime originating from this country — email fraud scams — became so widespread they now bear an informal numerical name drawn from a local law code.", pts: 200 },
    { text: "The country contains one of Africa's most biodiverse river delta systems, simultaneously one of the most oil-polluted ecosystems in the world.", pts: 200 },
  ],

  "Saudi Arabia": [
    { text: "This country sits atop approximately 17% of the world's proven oil reserves, and its state-owned oil company is valued as the largest in the world.", pts: 0 },
    { text: "Women here were only granted the right to drive in 2018 — activists who had campaigned for this right were arrested the same year the reform was announced.", pts: 150 },
    { text: "The country spent decades building the world's largest desalination capacity — it produces more fresh water from seawater than any other nation.", pts: 150 },
    { text: "It is home to the two holiest cities in Islam, visited collectively by millions of pilgrims annually — the hajj is the world's largest annual human gathering.", pts: 150 },
    { text: "The country has no rivers — it is entirely dependent on groundwater aquifers and desalination, and those aquifers are expected to run dry within decades.", pts: 200 },
    { text: "A kingdom here introduced a 'Vision 2030' plan to build a city of pure glass and steel in the desert, 170 km long and invisible from the outside, as a post-oil economy project.", pts: 200 },
    { text: "The country exports massive quantities of camel milk powder and camel meat, with a domestic camel population of around 1 million — the world's largest.", pts: 200 },
    { text: "The ruling family here has approximately 15,000 princes — descendants of a single founder through dozens of wives — creating a royal class that controls most state institutions.", pts: 200 },
  ],

  "Israel": [
    { text: "This country has the highest number of museums per capita in the world, and more university degrees per capita than almost any other nation.", pts: 0 },
    { text: "It invented drip irrigation technology — a system that delivers water directly to plant roots and has transformed agriculture in arid regions globally.", pts: 150 },
    { text: "The country has compulsory military service for both men and women, with most citizens serving two to three years in their late teens.", pts: 150 },
    { text: "Its main language was a classical, liturgical language with no native speakers for over 1,700 years — revived as a modern spoken tongue in the 20th century, uniquely in recorded history.", pts: 200 },
    { text: "The country has more startup companies per capita than anywhere else on Earth — a density of innovation that has earned it the nickname 'the startup nation'.", pts: 150 },
    { text: "It is the only country in the world that has successfully eradicated a desert — planting over a billion trees in the Negev over 50 years reversed desertification in significant areas.", pts: 200 },
    { text: "The Dead Sea — partly bordered by this country — is the lowest point on Earth's surface and is shrinking by over one metre per year.", pts: 150 },
    { text: "This country's intelligence agency is widely credited with assassinating scientists in enemy countries working on nuclear programmes, using exploding phones and magnetic car bombs.", pts: 200 },
  ],

  "Pakistan": [
    { text: "This country is home to the world's second-highest mountain, and five of the fourteen 'eight-thousanders' — peaks above 8,000 metres — lie within its borders.", pts: 0 },
    { text: "It has the world's largest deep-sea port by volume capacity, built as part of a major infrastructure corridor connecting it to China.", pts: 150 },
    { text: "The country has the world's largest network of canals — a colonial-era irrigation system covering millions of hectares of otherwise arid land.", pts: 150 },
    { text: "It became the first country with a Muslim majority to elect a female head of government — in 1988 — though she was later assassinated on her return to politics.", pts: 200 },
    { text: "The country produced the world's youngest Nobel Peace Prize winner — a teenage girl shot by extremists for advocating girls' education who then won the prize at age 17.", pts: 150 },
    { text: "A game invented here called 'kabaddi' — a contact sport requiring players to hold their breath — has become a professional sport across South Asia and is now an Asian Games event.", pts: 200 },
    { text: "This country's truck art — decorating lorries with elaborate patterns, chains, and calligraphy — is considered one of the world's most complex forms of folk art.", pts: 200 },
    { text: "It was the first Muslim-majority country to successfully test nuclear weapons, doing so in 1998 in response to a neighbouring country's tests — making it the seventh nuclear power.", pts: 200 },
  ],

  "Netherlands": [
    { text: "This country has reclaimed roughly 17% of its total land area from the sea — entire provinces exist only because of centuries of drainage engineering.", pts: 0 },
    { text: "It has the world's highest bicycle-to-person ratio — more bicycles than people — with dedicated cycling infrastructure that predates most countries' road systems.", pts: 150 },
    { text: "The country once possessed one of the largest colonial empires relative to its own size — controlling spice trade routes that generated wealth comparable to modern tech monopolies.", pts: 150 },
    { text: "It pioneered a form of decriminalised drug policy in the 1970s — technically illegal cannabis is openly sold in licensed coffee shops in what amounts to a grey legal market.", pts: 150 },
    { text: "The country created one of history's first speculative economic bubbles — an obsession with a single flower bulb drove prices to the equivalent of a house before collapsing overnight.", pts: 200 },
    { text: "This small nation has the world's highest per-capita consumption of liquorice — consuming several kilograms per person annually, including a heavily salted variety most foreigners find unpleasant.", pts: 200 },
    { text: "The country's euthanasia law — one of the world's most liberal — permits assisted dying for patients experiencing 'unbearable suffering' with no recovery prospect, including some mental health cases.", pts: 200 },
    { text: "Nearly a quarter of its land sits below sea level, meaning without constant pumping and maintenance, large portions of its territory would be reclaimed by the ocean within days.", pts: 150 },
  ],

  "Sweden": [
    { text: "This country introduced the concept of the 'ombudsman' — an independent official empowered to receive and investigate public complaints against the government.", pts: 0 },
    { text: "It has one of the world's most extensive welfare states, funded by some of the highest income tax rates globally — yet consistently ranks among the happiest nations.", pts: 150 },
    { text: "The country is where dynamite was invented — by a scientist who, horrified at its military applications, used his fortune to establish the world's most prestigious prize awards.", pts: 150 },
    { text: "IKEA furniture — designed so that most pieces have the same name type — was founded here by a man who taught himself business skills from an encyclopaedia.", pts: 150 },
    { text: "The country has a law called 'allemansrätten' — the freedom to roam — allowing any person to walk, camp, or pick berries on any land, public or private.", pts: 150 },
    { text: "It introduced a system of parental leave so generous that fathers are legally required to take a minimum portion — to redistribute domestic labour.", pts: 200 },
    { text: "The country's capital is built on 14 islands, connected by 57 bridges, on a series of lakes and bays where the Baltic meets a large inland lake.", pts: 200 },
    { text: "This nation has gone from a major military empire — at one point controlling much of northern Europe — to 200+ years of unbroken peace and neutrality.", pts: 200 },
    { text: "The country hosts an annual festival where people gather to listen to — and celebrate — the sound of a specific bird's mating call at dawn, with thousands camping outdoors for it.", pts: 200 },
  ],

  "Thailand": [
    { text: "This country is the only nation in Southeast Asia that was never colonised by a European power, a fact that shapes its national identity and foreign policy to this day.", pts: 0 },
    { text: "It is the world's largest exporter of rice, and its cuisine is among the most globally replicated — with over 15,000 Thai restaurants in the United States alone.", pts: 150 },
    { text: "The country has more Buddhist temples than schools — with over 40,000 active temples, and novice monks often receiving their early education inside monastery walls.", pts: 150 },
    { text: "It is illegal here to step on the national currency, insult the monarchy, or leave the house without wearing underwear — all enforceable criminal offences.", pts: 150 },
    { text: "The country has the world's highest number of plastic surgery tourists — people who travel specifically to access cheaper cosmetic procedures.", pts: 200 },
    { text: "Muay Thai — a martial art using eight points of contact including elbows and knees — originated here and is now the world's fastest-growing combat sport.", pts: 150 },
    { text: "The country's monarchy holds a constitutional role so politically sensitive that any criticism of the royal family can result in 3–15 years imprisonment under lèse-majesté law.", pts: 200 },
    { text: "The world's largest gold Buddha statue sits in a small temple in its capital — the statue was accidentally discovered in the 1950s when workers cracked a layer of plaster off a 'plain' statue.", pts: 200 },
  ],

  "Kenya": [
    { text: "This country's 'Great Rift Valley' — running through it north to south — is actively splitting the African continent in two; in millions of years, a new ocean will form here.", pts: 0 },
    { text: "It dominates long-distance running globally — producing the majority of world record holders in marathon and half-marathon distances, primarily from a single highland tribe.", pts: 150 },
    { text: "The country was home to the oldest known ancestor of modern humans — fossil evidence here dates the emergence of the Homo genus to approximately 3.3 million years ago.", pts: 150 },
    { text: "A tree-planting movement started by a woman here — who later won the Nobel Peace Prize — planted over 51 million trees before her death.", pts: 150 },
    { text: "Mobile money transfer technology was pioneered here and now allows millions of people without bank accounts to pay bills and transfer money via basic mobile phones.", pts: 200 },
    { text: "The country hosts one of the world's greatest wildlife migrations — over 1.5 million wildebeest move annually through its plains in a cyclical pattern.", pts: 150 },
    { text: "This nation's capital sits at 1,700 metres altitude, giving it one of the mildest year-round climates of any major African city — essentially spring weather in every month.", pts: 200 },
    { text: "A colonial British system of 'white highlands' reserved prime agricultural land exclusively for European settlers here — a legacy that still shapes land inequality today.", pts: 200 },
  ],

  "Ukraine": [
    { text: "This country has the largest land area of any country entirely within Europe, and its plains produce so much grain it was historically called the 'breadbasket of Europe'.", pts: 0 },
    { text: "The world's worst nuclear power plant accident occurred here in 1986 — the surrounding area became a ghost zone, and the disaster is credited with accelerating the USSR's collapse.", pts: 150 },
    { text: "The country's language is closely related to Russian but is a distinct language — and suppressing it was historically used as a political tool to erase national identity.", pts: 150 },
    { text: "A medieval empire here in the 10th and 11th centuries, called the 'Kievan Rus', is the historical ancestor claimed by multiple modern Slavic nations simultaneously.", pts: 200 },
    { text: "The country voluntarily surrendered the world's third-largest nuclear arsenal in 1994 in exchange for security guarantees — guarantees later violated by one of the guarantor nations.", pts: 200 },
    { text: "A comedy actor and television personality became this country's president with 73% of the vote — and then led a wartime government after a full-scale invasion began.", pts: 150 },
    { text: "The country's traditional egg-decorating art, 'pysanka', dates back at least 2,000 years — each symbol and colour combination has a coded meaning.", pts: 150 },
    { text: "Sunflower oil, produced here in greater volumes than anywhere else, became a global commodity crisis when war disrupted its export through Black Sea ports.", pts: 200 },
  ],

  "Argentina": [
    { text: "This country has defaulted on its national debt more times than any other in modern history — yet remains one of South America's largest economies.", pts: 0 },
    { text: "It is the birthplace of a dance performed in close embrace, developed in the working-class neighbourhoods of its capital and now danced on every continent.", pts: 150 },
    { text: "The country has more psychologists per capita than any other nation — its capital city has the highest concentration of therapists of any city on Earth.", pts: 150 },
    { text: "A military junta here between 1976 and 1983 'disappeared' an estimated 30,000 people — victims were drugged and dropped alive into the ocean from aircraft.", pts: 200 },
    { text: "Beef consumption here is so culturally central that annual per-capita meat consumption has historically been among the highest in the world.", pts: 150 },
    { text: "A war fought here in 1982 lasted only 74 days, between this country and a nuclear power — over a remote island group inhabited by fewer than 2,000 civilians.", pts: 200 },
    { text: "This country became the destination of choice for Nazi war criminals fleeing post-war Europe — more senior war criminals settled here than anywhere else.", pts: 200 },
    { text: "Pope Francis, the first Latin American pope, was born and raised in this country and was Archbishop of its capital before being elected leader of the Catholic Church.", pts: 150 },
  ],

  "Poland": [
    { text: "This country was divided between three neighbouring empires for 123 years — it disappeared from the map entirely between 1795 and 1918, yet its culture and language survived.", pts: 0 },
    { text: "The world's deadliest single site of the Holocaust was located here — a complex that murdered an estimated 1.1 million people, the majority Jewish.", pts: 200 },
    { text: "The country produced the scientist who proved the Earth revolves around the Sun, the chemist who discovered two elements and won two Nobel Prizes, and a pope who served for 26 years.", pts: 150 },
    { text: "A shipyard workers' movement here in 1980 became the first legally recognised independent trade union in the Soviet bloc — the first crack in the Iron Curtain.", pts: 150 },
    { text: "The country's constitution of 1791 was the world's first written national constitution in Europe and the second ever, predating the French constitution by several months.", pts: 200 },
    { text: "Vodka was commercially produced here long before it became associated with Russia — and the country still disputes the spirit's true country of origin.", pts: 150 },
    { text: "The country rebuilt its entire historic capital city from rubble after World War II using 18th-century paintings as architectural blueprints — and the reconstruction is now a UNESCO World Heritage Site.", pts: 200 },
  ],

  "Vietnam": [
    { text: "This country defeated the world's most powerful military in the 20th century's most politically divisive war — and today is one of that same country's fastest-growing trading partners.", pts: 0 },
    { text: "It has one of the world's largest cave systems — one cave is large enough to contain a 40-story skyscraper inside its chambers.", pts: 150 },
    { text: "The country is the world's second-largest exporter of coffee, producing primarily a species — Robusta — with twice the caffeine content of the Arabica variety.", pts: 150 },
    { text: "Its coastline stretches over 3,400 kilometres but its width at one point narrows to just 50 kilometres — creating one of the world's most elongated nations.", pts: 150 },
    { text: "The country uses a writing system invented by a 17th-century Portuguese missionary to romanise its tonal language — completely replacing the Chinese-based script used for a thousand years.", pts: 200 },
    { text: "A meal called pho — a noodle soup requiring bones simmered for up to 24 hours — is so culturally embedded that some Vietnamese people eat it for breakfast, lunch, and dinner.", pts: 150 },
    { text: "The country fought a border war with China in 1979 — just four years after its war with the United States ended — and is currently in dispute with China over islands in the South China Sea.", pts: 200 },
    { text: "Its current political system is technically communist, yet it operates one of Asia's most open foreign investment regimes and has a rapidly growing private sector.", pts: 200 },
  ],

  "Colombia": [
    { text: "This country produces around 90% of the world's emeralds and is one of the world's largest producers of high-quality flowers, exporting to over 100 countries.", pts: 0 },
    { text: "It is the only country in South America with coastlines on both the Pacific Ocean and the Caribbean Sea simultaneously.", pts: 150 },
    { text: "The country has the greatest bird diversity of any nation on Earth — over 1,900 species have been recorded, more than in all of North America.", pts: 150 },
    { text: "At its worst, this country had the world's highest murder rate — now significantly reduced — largely driven by a single cartel leader who appeared on Forbes' billionaire list.", pts: 200 },
    { text: "The country produces the world's finest arabica coffee, grown at high altitude in a region with such specific climate conditions that it cannot be replicated elsewhere.", pts: 150 },
    { text: "Its constitution, written in 1991 with civilian input, explicitly recognises the rights of nature, ethnic minorities, and declares the country a 'social state of law'.", pts: 200 },
    { text: "A literary movement called 'magical realism' was pioneered by an author from this country — blending supernatural events with mundane reality in ways that influenced global fiction.", pts: 150 },
    { text: "The country fought a 52-year civil war — one of the longest in the Western Hemisphere — that ended with a peace agreement in 2016, though violence continues in rural areas.", pts: 200 },
  ],

  "Portugal": [
    { text: "This small country once controlled the largest empire by sea routes, establishing trade posts from Brazil to Japan before any other European power.", pts: 0 },
    { text: "It invented a musical genre — 'fado' — described as melancholic longing for things lost, which UNESCO has listed as intangible cultural heritage.", pts: 150 },
    { text: "The country has the world's longest uninterrupted border between two countries in Europe — sharing it with a single neighbour for over 800 years without territorial change.", pts: 200 },
    { text: "It was the first country to fully decriminalise possession of all drugs in 2001 — treating addiction as a public health issue rather than a criminal one.", pts: 150 },
    { text: "The country exports more cork than any other nation — supplying over 50% of the world's cork products from its ancient cork oak forests.", pts: 150 },
    { text: "Its sailors mapped and named most of the world's southern ocean geography — many island groups and coastal features bear Portuguese names given during 15th and 16th century explorations.", pts: 200 },
    { text: "The country has the world's oldest continuously operating bookshop — open since 1732 — still in the same location in its capital.", pts: 200 },
    { text: "A 1755 earthquake here destroyed the capital and is considered the first modern disaster — triggering philosophical debates about divine providence and inspiring early urban planning.", pts: 200 },
  ],

  "Kenya": [
    { text: "This country's 'Great Rift Valley' is actively splitting the African continent apart — a new ocean will form here in millions of years.", pts: 0 },
    { text: "It dominates long-distance running globally — producing most world record holders in marathon distances, concentrated in one high-altitude region.", pts: 150 },
    { text: "Mobile money transfer technology was pioneered here and has since become a model for financial inclusion in countries without banking infrastructure.", pts: 200 },
    { text: "The country hosts the largest annual wildlife migration on Earth — over 1.5 million wildebeest moving through its plains in a cyclical pattern.", pts: 150 },
    { text: "A Nobel Peace Prize was awarded to a woman from this country for starting a movement that planted over 51 million trees.", pts: 150 },
    { text: "British colonisers here imposed a 'white highlands' system — reserving the best farmland exclusively for European settlers — whose consequences shape land inequality today.", pts: 200 },
    { text: "The country's capital is located at 1,700 metres elevation, giving it a permanently mild climate with spring-like conditions throughout the year.", pts: 150 },
    { text: "Some of the earliest evidence of human tool use — stone tools dated to 3.3 million years ago — was found within this country's borders.", pts: 200 },
  ],

  "South Africa": [
    { text: "This country has 11 official languages — more than any other nation on Earth — a linguistic diversity recognised directly in its constitution.", pts: 0 },
    { text: "It is the only country that has voluntarily built and then dismantled a nuclear weapons programme — it destroyed all six of its nuclear bombs in the early 1990s.", pts: 200 },
    { text: "The country contains the world's largest uranium deposits and produces about a third of the world's platinum and palladium supply.", pts: 150 },
    { text: "A policy of racial segregation here — enforced by law from 1948 to 1994 — was one of the most elaborate legal systems of discrimination ever devised.", pts: 150 },
    { text: "The man who led the transition from that system spent 27 years imprisoned before becoming the country's first democratically elected president.", pts: 150 },
    { text: "The world's first successful heart transplant was performed here in 1967 — a procedure that kept its patient alive for 18 days before he died of pneumonia.", pts: 200 },
    { text: "The country's Cape Floral Region is one of the world's six floral kingdoms — and the smallest — yet contains more plant species per square kilometre than the Amazon rainforest.", pts: 200 },
    { text: "Its city of Johannesburg was built almost entirely on gold — founded in 1886 after the world's largest gold deposit was discovered beneath its surface.", pts: 150 },
  ],

  "Cuba": [
    { text: "This country has more doctors per capita than almost any other nation, and exports medical staff to over 60 countries as a major source of foreign revenue.", pts: 0 },
    { text: "Despite a decades-long economic embargo, it achieved a literacy rate above 99%, one of the highest in the world.", pts: 150 },
    { text: "The country is famous globally for a style of old car still in widespread daily use — 1950s American vehicles maintained for 70 years by improvised mechanical ingenuity.", pts: 150 },
    { text: "A music style originating here — combining African rhythms with European harmony — became the basis for most Latin popular music genres of the 20th century.", pts: 150 },
    { text: "The country was the site of the closest the world came to nuclear war — a confrontation in 1962 between two superpowers, with Soviet missiles positioned here.", pts: 200 },
    { text: "It practises a form of organic farming by necessity — deprived of synthetic fertilisers and pesticides after its main supplier collapsed, it built the world's largest urban organic food network.", pts: 200 },
    { text: "The country was under the control of a single leader for 47 consecutive years — the longest non-royal uninterrupted rule of any 20th/21st century nation.", pts: 150 },
    { text: "Cigars hand-rolled here are considered the finest in the world — 'rolling a cigar' on a thigh is a local legend, though the actual method is more hygienic.", pts: 150 },
  ],

  "Denmark": [
    { text: "This country consistently ranks first in global 'happiness indexes' — a phenomenon researchers attribute to low inequality, high trust, and modest expectations.", pts: 0 },
    { text: "It introduced the world's first carbon tax in 1992 and has since become a global leader in wind energy — generating over 50% of its electricity from wind turbines.", pts: 150 },
    { text: "A concept called 'hygge' — difficult to translate, roughly meaning cosy togetherness — originated here and became a global lifestyle trend in the 2010s.", pts: 150 },
    { text: "The country technically controls Greenland — the world's largest island — which is 50 times its own size but has an autonomous government.", pts: 150 },
    { text: "Its national fairy tale author gave the world stories of mermaids, ugly ducklings, and matchstick girls — tales that underlie most modern animated storytelling conventions.", pts: 150 },
    { text: "The country has the world's oldest national flag still in use by an independent nation — a white cross on red, dating to the 13th century.", pts: 200 },
    { text: "It pioneered a model of 'flexicurity' — combining highly flexible hire-and-fire labour laws with generous unemployment benefits — now studied globally as a labour policy model.", pts: 200 },
    { text: "A cuisine movement here in the 2000s — 'New Nordic' — transformed fine dining globally, reintroducing fermented foods, foraged ingredients, and seasonal restriction as culinary philosophy.", pts: 200 },
  ],

  "Morocco": [
    { text: "This country contains the world's largest phosphate reserve — a mineral essential for fertilisers — controlling around 70% of global reserves.", pts: 0 },
    { text: "The world's oldest university still in continuous operation was founded here in 859 AD by a woman — a fact often overlooked in histories of higher education.", pts: 150 },
    { text: "The country straddles two continents — its territory includes land in both Africa and, through an enclave, in Europe — making it the only country touching both.", pts: 150 },
    { text: "The leather tanning district in its ancient medina has operated using the same methods for over a thousand years — the dye pits are still visible from surrounding rooftop terraces.", pts: 150 },
    { text: "A spice blend called 'ras el hanout' — meaning 'head of the shop' — can contain up to 100 different ingredients, and its exact composition is a closely guarded merchant secret.", pts: 200 },
    { text: "The country produces around 700,000 tonnes of argan oil annually — a cosmetic and culinary oil from a tree that only grows in this specific regional climate.", pts: 200 },
    { text: "Its desert region is used as a training ground for Mars mission simulations — the terrain is considered the most Mars-like environment accessible on Earth.", pts: 200 },
    { text: "The country's ancient walled city is a UNESCO World Heritage Site where GPS navigation fails — the alleyways are so densely interwoven that digital maps simply show blank space.", pts: 150 },
  ],

  "Singapore": [
    { text: "This city-state has no natural fresh water sources and imports all its water from a neighbouring country — or manufactures it through a patented recycled sewage purification process.", pts: 0 },
    { text: "It went from a third-world country to having one of the world's highest GDPs per capita in a single generation — often called the most successful economic transformation in history.", pts: 150 },
    { text: "Chewing gum is effectively banned here — it can only be purchased with a doctor's prescription for medical purposes.", pts: 150 },
    { text: "The country has only one official ethnicity that does not form a majority — its government enforces racial quotas in public housing to prevent ethnic enclaves from forming.", pts: 200 },
    { text: "Despite being smaller than New York City, this country operates one of the world's busiest ports by cargo volume.", pts: 150 },
    { text: "The world's most Michelin-starred street food stall is located here — a simple chicken rice stand awarded a star in 2016, with a regular queue of over two hours.", pts: 200 },
    { text: "Its government designed the entire country using 'urban heat island' mitigation — every major building must incorporate greenery by law.", pts: 200 },
    { text: "The country built an entire district — 'Gardens by the Bay' — where 18-storey artificial trees generate solar power and collect rainwater as a national statement about sustainability.", pts: 150 },
  ],

  "Venezuela": [
    { text: "This country has the world's largest proven oil reserves — larger than Saudi Arabia — yet experienced one of the worst economic collapses in modern history.", pts: 0 },
    { text: "The world's highest waterfall is located here — a free-falling drop of 979 metres, named after an American bush pilot who 'discovered' it in 1933 (despite indigenous peoples knowing it for millennia).", pts: 150 },
    { text: "The country's hyperinflation reached such extremes that the government issued a 100-trillion bolivar note — and it still wasn't enough to buy a loaf of bread.", pts: 150 },
    { text: "It has a lake where the water permanently glows at night — bioluminescent organisms in a brackish lagoon produce blue-green light when disturbed.", pts: 200 },
    { text: "The country won more Miss Universe titles than any other nation — a remarkable concentration of wins for its population size.", pts: 150 },
    { text: "A plateau system here — the 'tepuis' — inspired Arthur Conan Doyle's 'The Lost World'; these flat-topped mountains host species found nowhere else on Earth.", pts: 200 },
    { text: "Over 7 million citizens have emigrated since 2015 — one of the largest displacement crises in the Western Hemisphere.", pts: 200 },
  ],

  "Cuba": [
    { text: "This island nation has more doctors per capita than almost any other country and exports medical missions to over 60 nations.", pts: 0 },
    { text: "The country maintained a near-universal literacy rate above 99% despite decades of economic embargo by a superpower neighbour.", pts: 150 },
    { text: "It was the epicentre of the closest moment the world came to nuclear annihilation — a standoff in 1962 that lasted 13 days.", pts: 200 },
    { text: "This country practises urban agriculture on a vast scale by necessity — organic farming became a survival strategy after fertiliser imports collapsed.", pts: 200 },
    { text: "A single leader governed it for 47 consecutive years — longer than any other non-royal leader in the 20th or 21st century.", pts: 150 },
    { text: "Its classic cars — American vehicles from the 1950s kept running by improvised engineering — have become one of the country's most photographed symbols.", pts: 150 },
    { text: "The country developed a lung cancer vaccine before most developed nations — due partly to isolation forcing domestic pharmaceutical innovation.", pts: 200 },
  ],

  "Kazakhstan": [
    { text: "This country is the world's largest landlocked nation — larger than Western Europe — yet shares a border with only five countries.", pts: 0 },
    { text: "The world's first and largest operational spaceport is located here — it has launched more spacecraft than any other facility in history.", pts: 150 },
    { text: "This country was the Soviet Union's nuclear testing ground — over 450 nuclear tests were conducted here between 1949 and 1989, the largest test program in history.", pts: 200 },
    { text: "The apple likely originated here — wild apple forests still grow in its mountains and are considered the genetic ancestors of all domesticated apple varieties.", pts: 150 },
    { text: "The country moved its capital city in 1997 from the historic south to a newly built city in the frozen north — purely as a political strategy against separatism.", pts: 200 },
    { text: "Its steppe is the original homeland of the horse — the first domestication of horses occurred here approximately 5,500 years ago, changing human civilisation permanently.", pts: 200 },
    { text: "The Aral Sea — once the world's fourth-largest lake — almost entirely disappeared within this country's borders due to Soviet irrigation projects diverting its feeder rivers.", pts: 200 },
  ],

  "Ghana": [
    { text: "This country was the first in sub-Saharan Africa to gain independence from colonial rule, in 1957, under a leader who became a symbol of pan-African liberation.", pts: 0 },

// ─── ENGINE ───────────────────────────────────────────────────────────────────
// Each country can be used multiple times per session with different clue combinations.
// We track which clue INDICES have been used globally per country to avoid repeating.
// A "question" = { answer, clues: [5 clues selected from pool] }

const usedClueMap = {}; // { countryName: Set of used indices }

function getUsedSet(country) {
  if (!usedClueMap[country]) usedClueMap[country] = new Set();
  return usedClueMap[country];
}

function pickCluesForCountry(country) {
  const pool = CLUE_DB[country];
  if (!pool || pool.length < 5) return null;
  const used = getUsedSet(country);

  // Reset if we've exhausted enough of the pool
  if (pool.length - used.size < 5) {
    usedClueMap[country] = new Set();
  }

  const available = pool.map((_, i) => i).filter(i => !usedClueMap[country].has(i));
  const shuffled = shuffle(available);
  const chosen = shuffled.slice(0, 5);
  chosen.forEach(i => usedClueMap[country].add(i));

  // Ensure first clue has pts:0, rest have pts>0
  const clues = chosen.map((i, pos) => {
    const c = pool[i];
    if (pos === 0) return { text: c.text, pts: 0 };
    return { text: c.text, pts: c.pts || 150 };
  });
  return clues;
}

function buildGameQuestions() {
  const countries = Object.keys(CLUE_DB);
  const shuffledCountries = shuffle(countries);

  // Pick 10 unique countries, build question objects
  const selected = shuffledCountries.slice(0, 10);
  return selected.map(country => ({
    answer: country,
    clues: pickCluesForCountry(country),
  })).filter(q => q.clues !== null);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let questions = [];
let currentQ = 0;
let currentClueIdx = 0;
let maxPts = 1000;
let totalScore = 0;
let attemptsLeft = 3;
let roundOver = false;
let gamesPlayed = 0;

function initGame() {
  questions = buildGameQuestions();
  currentQ = 0;
  totalScore = 0;
  gamesPlayed++;
  loadRound();
}

function loadRound() {
  roundOver = false;
  currentClueIdx = 0;
  maxPts = 1000;
  attemptsLeft = 3;

  const q = questions[currentQ];
  document.getElementById('roundTag').textContent = `ROUND ${String(currentQ+1).padStart(2,'0')} · IDENTIFY THE COUNTRY`;
  document.getElementById('roundNum').textContent = `${currentQ+1}/10`;
  document.getElementById('progressFill').style.width = `${((currentQ+1)/10)*100}%`;
  document.getElementById('maxPoints').textContent = maxPts;
  document.getElementById('totalScore').textContent = totalScore;
  document.getElementById('guessInput').value = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('autocompleteList').classList.remove('show');
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('sessionNote').textContent = gamesPlayed > 1 ? `Game #${gamesPlayed} · Clue pool: ${Object.values(usedClueMap).reduce((a,b) => a + b.size, 0)} used globally` : '';

  renderClues();
  renderAttempts();
  updateHintCost();
}

function renderClues() {
  const q = questions[currentQ];
  const list = document.getElementById('clueList');
  list.innerHTML = '';

  for (let i = 0; i <= currentClueIdx; i++) {
    const clue = q.clues[i];
    const li = document.createElement('li');
    li.className = 'clue-item' + (i === currentClueIdx ? ' new' : '');
    li.innerHTML = `
      <span class="clue-num">${String(i+1).padStart(2,'0')}</span>
      <span class="clue-text">${clue.text}</span>
      ${clue.pts > 0 ? `<span class="clue-deduction">−${clue.pts}</span>` : ''}
    `;
    list.appendChild(li);
  }

  const locked = document.getElementById('lockedClue');
  const nextIdx = currentClueIdx + 1;
  if (nextIdx < q.clues.length) {
    locked.style.display = 'flex';
    document.getElementById('nextDeduction').textContent = `−${q.clues[nextIdx].pts}`;
  } else {
    locked.style.display = 'none';
  }
}

function renderAttempts() {
  const row = document.getElementById('attemptsRow');
  row.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'attempt-dot' + (i >= attemptsLeft ? ' used' : ' left');
    row.appendChild(dot);
  }
}

function updateHintCost() {
  const q = questions[currentQ];
  const nextIdx = currentClueIdx + 1;
  if (nextIdx < q.clues.length) {
    document.getElementById('hintCost').textContent = q.clues[nextIdx].pts;
  }
  const hintBtn = document.getElementById('hintBtn');
  hintBtn.disabled = (nextIdx >= q.clues.length) || roundOver;
}

function revealHint() {
  if (roundOver) return;
  const q = questions[currentQ];
  const nextIdx = currentClueIdx + 1;
  if (nextIdx >= q.clues.length) return;

  const deduction = q.clues[nextIdx].pts;
  maxPts = Math.max(0, maxPts - deduction);
  currentClueIdx++;
  document.getElementById('maxPoints').textContent = maxPts;
  renderClues();
  updateHintCost();
}

function submitGuess() {
  if (roundOver) return;
  const input = document.getElementById('guessInput');
  const guess = input.value.trim();
  if (!guess) return;

  const q = questions[currentQ];
  const fb = document.getElementById('feedback');
  document.getElementById('autocompleteList').classList.remove('show');

  if (guess.toLowerCase() === q.answer.toLowerCase()) {
    roundOver = true;
    totalScore += maxPts;
    showResult(true, maxPts);
  } else {
    attemptsLeft--;
    renderAttempts();
    input.value = '';

    if (attemptsLeft <= 0) {
      roundOver = true;
      fb.className = 'feedback wrong';
      fb.textContent = `No attempts left. The answer was ${q.answer}.`;
      setTimeout(() => showResult(false, 0), 1200);
    } else {
      fb.className = 'feedback wrong';
      fb.textContent = `"${guess}" is incorrect. ${attemptsLeft} attempt${attemptsLeft === 1 ? '' : 's'} remaining.`;
      maxPts = Math.max(0, maxPts - 100);
      document.getElementById('maxPoints').textContent = maxPts;
    }
  }
}

function showResult(correct, pts) {
  const overlay = document.getElementById('resultOverlay');
  const q = questions[currentQ];

  document.getElementById('resultEmoji').textContent = correct ? '🎉' : '😔';
  document.getElementById('resultTitle').textContent = correct ? 'Correct!' : 'Not quite…';
  document.getElementById('resultTitle').style.color = correct ? 'var(--accent)' : 'var(--red)';
  document.getElementById('resultCountry').textContent = `The answer was: ${q.answer}`;
  document.getElementById('resultPoints').textContent = correct ? `+${pts}` : `+0`;
  document.getElementById('resultPoints').style.color = correct ? 'var(--gold)' : 'var(--text-dim)';
  document.getElementById('totalScore').textContent = totalScore;

  const cluesUsed = currentClueIdx + 1;
  document.getElementById('resultSub').textContent = correct
    ? `Used ${cluesUsed} clue${cluesUsed === 1 ? '' : 's'} · Running total: ${totalScore} pts`
    : `Running total: ${totalScore} pts`;

  overlay.classList.add('show');
}

function nextRound() {
  document.getElementById('resultOverlay').classList.remove('show');
  currentQ++;
  if (currentQ >= questions.length) {
    endGame();
  } else {
    loadRound();
  }
}

function endGame() {
  document.getElementById('finalScore').textContent = totalScore;
  const ranks = [
    [9000, '🌍 World-Class Geographer'],
    [7000, '🗺️ Seasoned Explorer'],
    [5000, '🧭 Curious Traveler'],
    [3000, '📍 Decent Navigator'],
    [0, '🌐 Keep Exploring!'],
  ];
  const [, label] = ranks.find(([min]) => totalScore >= min);
  document.getElementById('finalRank').textContent = label;
  document.getElementById('gameOverOverlay').classList.add('show');
}

function skipRound() {
  if (roundOver) return;
  roundOver = true;
  showResult(false, 0);
}

function restartGame() {
  document.getElementById('gameOverOverlay').classList.remove('show');
  initGame();
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
const inputEl = document.getElementById('guessInput');
const acList = document.getElementById('autocompleteList');
let acActive = -1;

inputEl.addEventListener('input', () => {
  const val = inputEl.value.trim().toLowerCase();
  acList.innerHTML = '';
  acActive = -1;
  if (!val || val.length < 2) { acList.classList.remove('show'); return; }

  const matches = ALL_COUNTRIES.filter(c => c.toLowerCase().startsWith(val)).slice(0, 6);
  if (!matches.length) { acList.classList.remove('show'); return; }

  matches.forEach(c => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.textContent = c;
    div.addEventListener('mousedown', () => {
      inputEl.value = c;
      acList.classList.remove('show');
    });
    acList.appendChild(div);
  });
  acList.classList.add('show');
});

inputEl.addEventListener('keydown', (e) => {
  const items = acList.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    acActive = Math.min(acActive + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('active', i === acActive));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acActive = Math.max(acActive - 1, -1);
    items.forEach((it, i) => it.classList.toggle('active', i === acActive));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (acActive >= 0 && items[acActive]) {
      inputEl.value = items[acActive].textContent;
      acList.classList.remove('show');
    } else {
      submitGuess();
    }
  } else if (e.key === 'Escape') {
    acList.classList.remove('show');
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.input-wrap')) acList.classList.remove('show');
});

// ─── GO ───────────────────────────────────────────────────────────────────────
initGame();
</script>
